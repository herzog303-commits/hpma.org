# Rebuilds the Pagefind search index whenever page content changes, and
# commits the updated /pagefind/ folder back to main so GitHub Pages serves it.
# The index can also be built locally (see "Search" in the README).
# Keep the Pagefind version here in sync with the pip version in the README.
name: Rebuild search index

on:
  push:
    branches: [main]
    paths: ['**.html']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: search-index
  cancel-in-progress: true

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build index
        run: |
          rm -rf pagefind
          npx -y pagefind@1.5.2 --site .

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A pagefind
          if ! git diff --cached --quiet; then
            git commit -m "Rebuild search index"
            # A commit may have landed on main while this job ran; rebase so
            # the push isn't rejected as non-fast-forward.
            git pull --rebase origin main
            git push
          else
            echo "Index unchanged; nothing to commit."
          fi
